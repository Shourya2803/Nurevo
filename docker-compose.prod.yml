services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: nuvero-backend-prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
      - MONGO_DB_NAME=nuvero_db
    networks:
      - nuvero_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/auth/signup"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: nuvero-frontend-prod
    restart: unless-stopped
    ports:
      - "80:8080"
    env_file:
      - ./frontend/.env
    networks:
      - nuvero_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  nuvero_network:
    driver: bridge
