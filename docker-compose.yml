# Default docker-compose file pointing to development setup.
# Run 'docker compose -f docker-compose.prod.yml up' for production builds.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: nuvero-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
      - /app/__pycache__
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=development
      - MONGO_DB_NAME=nuvero_db
    networks:
      - nuvero_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: nuvero-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    networks:
      - nuvero_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  nuvero_network:
    driver: bridge
